<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <title>Validation Formulaire</title>
  </head>
  <body>
    <form id="formulaire" novalidate>
      <h1>Inscription</h1>
      <label for="nom">Nom</label>
      <input type="text" id="nom" />
      <small class="message" id="msg-nom"></small>

      <label for="email">Email</label>
      <input type="email" id="email" />
      <small class="message" id="msg-email"></small>

      <label for="mdp">Mot de passe</label>
      <input type="password" id="mdp" />
      <small class="message" id="msg-mdp"></small>

      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" />
      <small class="message" id="msg-confirm"></small>

      <button disabled id="btn" type="submit">S'inscrire</button>
    </form>
    <script src="index.js"></script>
  </body>
</html>
