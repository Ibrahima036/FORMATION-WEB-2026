<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Slider & Menu Burger</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== NAVIGATION AVEC MENU BURGER ===== -->
    <nav class="navbar">
      <div class="logo">MonSite</div>
      <button class="burger" id="burger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="#">Accueil</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">À propos</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="slider" id="slider">
      <div class="slides" id="slides">
        <div class="slide" style="background: #3498db">Slide 1</div>
        <div class="slide" style="background: #e74c3c">Slide 2</div>
        <div class="slide" style="background: #2ecc71">Slide 3</div>
        <div class="slide" style="background: #f39c12">Slide 4</div>
      </div>
      <button class="prev" id="prev">‹</button>
      <button class="next" id="next">›</button>
      <div class="points" id="points"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
